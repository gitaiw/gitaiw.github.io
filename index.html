  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const imgs = document.querySelectorAll("img[data-src]");

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;

            if (!img.dataset.src) return;

            img.style.opacity = "0";
            img.style.transition = "opacity 0.3s ease";

            const onLoad = () => {
              img.style.opacity = "1";
              img.removeEventListener("load", onLoad);
            };

            img.addEventListener("load", onLoad);

            img.src = img.dataset.src;

            img.removeAttribute("data-src");

            obs.unobserve(img);
          }
        });
      }, {
        rootMargin: "100px"
      });

      imgs.forEach(img => observer.observe(img));

    });
  </script>
  <script>
    function tambahkanClassJikaAdaCSS(daftarClass, daftarPrefix) {
      daftarClass.forEach((cls, i) => {
        const prefixes = daftarPrefix[i];

        const elemen = document.querySelectorAll(`.${cls}`);

        elemen.forEach((el, index) => {
          prefixes.forEach((prefix) => {
            const namaClassUrut = `${prefix}-${index + 1}`;
            let classAdaDiCSS = false;

            for (let sheet of document.styleSheets) {
              try {
                for (let rule of sheet.cssRules) {
                  if (rule.selectorText && rule.selectorText.includes(`.${namaClassUrut}`)) {
                    classAdaDiCSS = true;
                    break;
                  }
                }
              } catch (e) {
                continue;
              }
              if (classAdaDiCSS) break;
            }

            if (classAdaDiCSS) {
              el.classList.add(namaClassUrut);
            }
          });
        });
      });
    }

    window.addEventListener('load', () => {
      tambahkanClassJikaAdaCSS(
        ['hero', 'this_content'],
        [
          ['s-h___'],
          ['t-c___']
        ]
      );
    });
